<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>第一幕 8分鐘互動 — 進度報告</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.31.0/tabler-icons.min.css">
<style>
  :root{
    --text-primary:#1f1f1c; --text-secondary:#5f5e5a; --text-muted:#888780;
    --text-accent:#185fa5; --text-success:#0f6e56; --text-warning:#854f0b;
    --surface-0:#faf9f5; --surface-1:#f1efe8; --surface-2:#ffffff;
    --border:#e0ded4; --radius:8px;
    --bg-accent:#e6f1fb; --bg-success:#e1f5ee; --bg-warning:#faeeda;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--surface-0); color:var(--text-primary);
    font-family:-apple-system,"Segoe UI","Microsoft JhengHei",sans-serif;
    line-height:1.7; padding:2rem; display:flex; justify-content:center;}
  .page{width:100%; max-width:760px;}
  h2{font-weight:500; margin:0;}
  .sr-only{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0);}
  @media print{ body{background:#fff; padding:0;} }
</style>
</head>
<body>
<div class="page">

<div style="padding:0.5rem 0 1rem;">
  <div style="display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:4px;">
    <h2 style="font-size:20px;">第一幕「外海夜間蹦火」· 8分鐘互動</h2>
    <span style="font-size:13px; color:var(--text-secondary);">本週目標 · 整體約 33%</span>
  </div>
  <div style="height:8px; border-radius:99px; background:var(--surface-1); overflow:hidden; margin-top:8px;">
    <div style="width:33%; height:100%; background:var(--text-accent); border-radius:99px;"></div>
  </div>
</div>

<div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:1.5rem;">
  <div style="background:var(--bg-success); border-radius:var(--radius); padding:0.75rem 1rem;">
    <div style="font-size:13px; color:var(--text-success);">完成</div>
    <div style="font-size:24px; font-weight:500; color:var(--text-success);">8</div>
  </div>
  <div style="background:var(--bg-warning); border-radius:var(--radius); padding:0.75rem 1rem;">
    <div style="font-size:13px; color:var(--text-warning);">進行中</div>
    <div style="font-size:24px; font-weight:500; color:var(--text-warning);">1</div>
  </div>
  <div style="background:var(--surface-1); border-radius:var(--radius); padding:0.75rem 1rem;">
    <div style="font-size:13px; color:var(--text-secondary);">待做</div>
    <div style="font-size:24px; font-weight:500; color:var(--text-primary);">12</div>
  </div>
  <div style="background:var(--bg-accent); border-radius:var(--radius); padding:0.75rem 1rem;">
    <div style="font-size:13px; color:var(--text-accent);">等素材/待定</div>
    <div style="font-size:24px; font-weight:500; color:var(--text-accent);">3</div>
  </div>
</div>

<div id="cats"></div>

<div style="margin-top:1.5rem; background:var(--bg-accent); border-radius:12px; padding:1rem 1.25rem;">
  <div style="font-size:14px; font-weight:500; color:var(--text-accent); margin-bottom:8px;"><i class="ti ti-route" style="font-size:18px; vertical-align:-3px; margin-right:6px;"></i>本週關鍵路徑</div>
  <div style="font-size:14px; color:var(--text-accent); line-height:1.7;">1. 互動中樞 InteractionController（接箭頭+字幕+hover）→ 2. 魚群／右舷／乙炔桶 hover 偵測 → 3. Timeline marker 接線（IntObject 驅動）→ 4. 捕魚動作序列（下網起網入艙）</div>
</div>

</div>
<script>
const cats = [
  { name:"互動系統", icon:"ti-hand-finger", done:1, total:6, items:[
    ["箭頭指示器 DirectionIndicator","done"],
    ["互動中樞 InteractionController","todo"],
    ["魚群標記 + hover 偵測 ×3","todo"],
    ["說明面板系統","todo"],
    ["面板文案 ×3","asset"],
    ["面板開啟時 暫停／繼續 決策","pending"],
  ]},
  { name:"捕魚表現", icon:"ti-flame", done:2, total:5, items:[
    ["點火程序動畫（6段）","done"],
    ["魚群趨光聚集（8192）","done"],
    ["主火焰強光爆亮","wip"],
    ["魚跳躍水花","todo"],
    ["下網 → 起網 → 入艙","todo"],
  ]},
  { name:"角色表演", icon:"ti-users", done:1, total:4, items:[
    ["磺火操作手 點火","done"],
    ["火長 搜魚／揮燈指揮","todo"],
    ["抄網手 ×2 下網序列","todo"],
    ["其他船員 配合動作","todo"],
  ]},
  { name:"環境", icon:"ti-moon", done:3, total:5, items:[
    ["海面 Crest","done"],
    ["月光打光","done"],
    ["夜間 Fog","done"],
    ["火光海面反射","todo"],
    ["星空 HDRI","asset"],
  ]},
  { name:"視聽", icon:"ti-volume", done:1, total:3, items:[
    ["字幕系統","done"],
    ["背景音樂（緊張漸升）","todo"],
    ["音效（點火／火焰／魚躍／網／呼號／海浪）","todo"],
  ]},
];
const S = {
  done:    {label:"完成",  bg:"var(--bg-success)", fg:"var(--text-success)", icon:"ti-check"},
  wip:     {label:"進行中",bg:"var(--bg-warning)", fg:"var(--text-warning)", icon:"ti-progress"},
  todo:    {label:"待做",  bg:"var(--surface-1)",  fg:"var(--text-muted)",   icon:"ti-circle"},
  asset:   {label:"等素材",bg:"var(--bg-accent)",  fg:"var(--text-accent)",  icon:"ti-clock"},
  pending: {label:"待定",  bg:"var(--bg-accent)",  fg:"var(--text-accent)",  icon:"ti-help-circle"},
};
document.getElementById("cats").innerHTML = cats.map(c => {
  const pct = Math.round(c.done / c.total * 100);
  const rows = c.items.map(([t,s]) => {
    const st = S[s];
    return `<div style="display:flex; align-items:center; gap:10px; padding:7px 0; border-top:0.5px solid var(--border);">
      <i class="ti ${st.icon}" style="font-size:17px; color:${st.fg};"></i>
      <span style="flex:1; font-size:14px; color:${s==='done'?'var(--text-secondary)':'var(--text-primary)'};">${t}</span>
      <span style="font-size:12px; color:${st.fg}; background:${st.bg}; padding:2px 10px; border-radius:99px;">${st.label}</span>
    </div>`;
  }).join("");
  return `<div style="background:var(--surface-2); border:0.5px solid var(--border); border-radius:12px; padding:1rem 1.25rem; margin-bottom:12px;">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
      <i class="ti ${c.icon}" style="font-size:19px; color:var(--text-secondary);"></i>
      <span style="font-size:16px; font-weight:500;">${c.name}</span>
      <span style="margin-left:auto; font-size:13px; color:var(--text-secondary);">${c.done}/${c.total} · ${pct}%</span>
    </div>
    ${rows}
  </div>`;
}).join("");
</script>
</body>
</html>
